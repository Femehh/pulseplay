version: '3.9'

# Development-only: just PostgreSQL
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulseplay
      POSTGRES_PASSWORD: pulseplay_secret
      POSTGRES_DB: pulseplay
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
